<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好時代衛浴 幸運轉盤 - 庫存記憶版</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #D86A75;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
            width: 90%; max-width: 450px;
        }
        .title-line1 { color: #ff6600; font-size: 28px; font-weight: bold; display: block; }
        .title-line2 { color: #ff6600; font-size: 28px; font-weight: bold; margin-top: 5px; display: block; }
        
        .wheel-container {
            position: relative; width: 320px; height: 320px; margin: 20px auto;
        }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        
        /* 指針修正：固定在正上方 */
        .pointer-box {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; z-index: 10;
        }
        .pointer-svg { width: 100%; height: 100%; }

        button {
            background: #ff6600; color: white; border: none; padding: 12px 60px;
            font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer;
        }
        button:disabled { background: #ccc; }
        
        .inventory-list {
            margin-top: 20px; font-size: 13px; color: #555; text-align: left;
            background: #f9f9f9; padding: 10px; border-radius: 10px;
        }
        .reset-btn { margin-top: 10px; font-size: 11px; color: #999; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <span class="title-line1">好時代衛浴</span>
    <span class="title-line2">🎡限量幸運轉盤🎡</span>

    <div class="wheel-container">
        <div class="pointer-box">
            <svg class="pointer-svg" viewBox="0 0 100 100">
                <path d="M50 100 L20 40 A35 35 0 1 1 80 40 Z" fill="#3b5998" stroke="#fff" stroke-width="3"/>
            </svg>
        </div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn">開始抽獎</button>
    <div id="result" style="margin-top:15px; font-weight:bold; color:#d32f2f; min-height:24px;"></div>
    
    <div class="inventory-list" id="inventory"></div>
    <div class="reset-btn" onclick="resetInventory()">重置庫存測試(管理員用)</div>
</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    const inventoryDiv = document.getElementById('inventory');

    // 1. 初始獎項設定
    const defaultPrizes = [
        { name: 'A賞: 8折優惠', count: 1, color: '#EDB4B1' },
        { name: 'B賞: 指定配件', count: 5, color: '#748BAC' },
        { name: 'C賞: GROHE清潔劑', count: 10, color: '#64738E' },
        { name: 'D賞: 9折優惠', count: 20, color: '#96A9C0' },
        { name: 'E賞: 衛生紙套', count: 50, color: '#AEBDC6' }
    ];

    // 2. 從 localStorage 讀取庫存，若無則使用預設值
    let prizes = JSON.parse(localStorage.getItem('wheel_inventory')) || defaultPrizes;
    let isSpinning = false;
    let currentDeg = 0; // 紀錄當前角度

    function saveInventory() {
        localStorage.setItem('wheel_inventory', JSON.stringify(prizes));
    }

    function resetInventory() {
        if(confirm("確定要恢復初始數量嗎？")) {
            localStorage.removeItem('wheel_inventory');
            location.reload();
        }
    }

    function updateUI() {
        let html = "<strong>目前剩餘獎項：</strong><br>";
        prizes.forEach(p => {
            html += `${p.name}：${p.count} <br>`;
        });
        inventoryDiv.innerHTML = html;
        drawWheel();
    }

    // 3. 繪製轉盤 (讓第一個獎項正對上方)
    function drawWheel() {
        const arc = (Math.PI * 2) / prizes.length;
        ctx.clearRect(0, 0, 600, 600);
        
        prizes.forEach((p, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = p.count > 0 ? p.color : '#eee';
            ctx.moveTo(300, 300);
            // 修正起始角度，讓 i=0 的扇形中心點在上方
            ctx.arc(300, 300, 300, angle - Math.PI/2 - arc/2, angle + arc - Math.PI/2 - arc/2);
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle - Math.PI/2);
            ctx.textAlign = "right";
            ctx.fillStyle = p.count > 0 ? "#fff" : "#bbb";
            ctx.font = "bold 30px Microsoft JhengHei";
            ctx.fillText(p.name.split(':')[0], 260, 10);
            ctx.restore();
        });
    }

    // 4. 機率邏輯：依照剩餘數量加權
    function getWinnerIndex() {
        const total = prizes.reduce((sum, p) => sum + p.count, 0);
        if (total === 0) return -1;
        let random = Math.random() * total;
        for (let i = 0; i < prizes.length; i++) {
            if (random < prizes[i].count) return i;
            random -= prizes[i].count;
        }
        return 0;
    }

    spinBtn.onclick = () => {
        if (isSpinning) return;

        const winnerIndex = getWinnerIndex();
        if (winnerIndex === -1) {
            alert("所有獎項已抽完！");
            return;
        }

        isSpinning = true;
        spinBtn.disabled = true;
        resultDiv.innerHTML = "好運降臨中...";

        // 計算角度：
        // 1. 旋轉 5~10 圈
        // 2. 減去 winnerIndex 應佔的角度 (每個區塊 360/5 = 72度)
        const segmentDeg = 360 / prizes.length;
        const extraSpins = (Math.floor(Math.random() * 5) + 5) * 360; 
        const targetDeg = extraSpins + (360 - (winnerIndex * segmentDeg));
        
        currentDeg += targetDeg; // 累加角度，防止轉盤倒轉
        
        canvas.style.transform = `rotate(${currentDeg}deg)`;

        setTimeout(() => {
            const winner = prizes[winnerIndex];
            winner.count--;
            saveInventory();
            
            resultDiv.innerHTML = `🎉 恭喜中獎：${winner.name}`;
            alert(`恭喜您抽中：${winner.name}！\n請截圖保留畫面。`);
            
            isSpinning = false;
            spinBtn.disabled = false;
            updateUI();
        }, 5100);
    };

    updateUI();
</script>

</body>
</html>
