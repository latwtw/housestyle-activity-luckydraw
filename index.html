<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好時代衛浴 幸運轉盤 - 精準對位版</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #D86A75;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
            width: 90%; max-width: 450px;
        }
        .title-line1 { color: #ff6600; font-size: 28px; font-weight: bold; display: block; }
        .title-line2 { color: #ff6600; font-size: 28px; font-weight: bold; margin-top: 5px; display: block; }
        
        .wheel-container {
            position: relative; width: 320px; height: 320px; margin: 20px auto;
        }
        /* 增加平滑動畫效果 */
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); 
        }
        
        /* 指針：固定在正上方 */
        .pointer-box {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; z-index: 10;
        }
        .pointer-svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }

        button {
            background: #ff6600; color: white; border: none; padding: 12px 60px;
            font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .inventory-list {
            margin-top: 20px; font-size: 13px; color: #555; text-align: left;
            background: #f9f9f9; padding: 10px; border-radius: 10px;
        }
        .reset-btn { margin-top: 10px; font-size: 11px; color: #bbb; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <span class="title-line1">好時代衛浴</span>
    <span class="title-line2">🎡春日換新幸運轉盤🎡</span>

    <div class="wheel-container">
        <div class="pointer-box">
            <svg class="pointer-svg" viewBox="0 0 100 100">
                <path d="M50 100 L20 40 A35 35 0 1 1 80 40 Z" fill="#3b5998" stroke="#fff" stroke-width="3"/>
            </svg>
        </div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn">開始抽獎</button>
    <div id="result" style="margin-top:15px; font-weight:bold; color:#d32f2f; min-height:24px;"></div>
    
    <div class="inventory-list" id="inventory"></div>
    <div class="reset-btn" onclick="resetInventory()">重置所有數據 (測試用)</div>
</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    const inventoryDiv = document.getElementById('inventory');

    const defaultPrizes = [
        { name: 'A賞: GROHE 洗臉機', count: 12, color: '#EDB4B1' },
        { name: 'B賞: GROHE 馬克杯或水壺', count: 14, color: '#748BAC' },
        { name: 'C賞: GROHE 香皂', count: 21, color: '#64738E' },
        { name: 'D賞: LAUFEN 帆布袋', count: 32, color: '#96A9C0' },
        { name: 'E賞: GROHE 龍頭棉布', count: 40, color: '#AEBDC6' }
    ];

    let prizes = JSON.parse(localStorage.getItem('wheel_inventory_v2')) || defaultPrizes;
    let isSpinning = false;
    let currentDeg = 0; 

    function saveInventory() {
        localStorage.setItem('wheel_inventory_v2', JSON.stringify(prizes));
    }

    function resetInventory() {
        if(confirm("確定要重置庫存嗎？")) {
            localStorage.removeItem('wheel_inventory_v2');
            location.reload();
        }
    }

    // 繪製轉盤：讓第一個獎項的中心點正對指針
    function drawWheel() {
        const num = prizes.length;
        const arc = (Math.PI * 2) / num;
        ctx.clearRect(0, 0, 600, 600);
        
        prizes.forEach((p, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = p.count > 0 ? p.color : '#eee';
            ctx.moveTo(300, 300);
            // 關鍵點：起始角度減去 Math.PI/2 (90度) 再減去半個扇形角度，讓第一個扇形的中間對準 12 點鐘
            ctx.arc(300, 300, 300, angle - Math.PI/2 - arc/2, angle + arc - Math.PI/2 - arc/2);
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();

            // 繪製文字
            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle - Math.PI/2);
            ctx.textAlign = "right";
            ctx.fillStyle = p.count > 0 ? "#fff" : "#bbb";
            ctx.font = "bold 34px Microsoft JhengHei";
            ctx.fillText(p.name.split(':')[0], 260, 12);
            ctx.restore();
        });
    }

    function updateUI() {
        let html = "<strong>剩餘獎項數量：</strong><br>";
        prizes.forEach(p => {
            html += `${p.name}：${p.count} <br>`;
        });
        inventoryDiv.innerHTML = html;
        drawWheel();
    }

    function getWinnerIndex() {
        const total = prizes.reduce((sum, p) => sum + p.count, 0);
        if (total === 0) return -1;
        let random = Math.random() * total;
        for (let i = 0; i < prizes.length; i++) {
            if (random < prizes[i].count) return i;
            random -= prizes[i].count;
        }
        return 0;
    }
