<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好時代衛浴 幸運轉盤 - 限量版</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #D86A75;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        .title-line1 { color: #ff6600; font-size: 28px; font-weight: bold; display: block; }
        .title-line2 { color: #ff6600; font-size: 28px; font-weight: bold; margin-top: 5px; display: block; }
        .subtitle { color: #666; margin: 10px 0 20px; font-size: 16px; }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform: rotate(-90deg);
        }

        .pointer-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(180deg); 
            width: 50px;
            height: 50px;
            z-index: 10;
        }

        .pointer-svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }

        button {
            background: #ff6600;
            color: white;
            border: none;
            padding: 12px 60px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
        }

        button:hover { background: #e65c00; transform: scale(1.05); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #result { margin-top: 20px; font-size: 18px; font-weight: bold; color: #333; min-height: 24px; }
        
        /* 顯示剩餘數量的小看板 */
        .inventory-list {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <span class="title-line1">好時代衛浴</span>
    <span class="title-line2">🎡限量幸運轉盤🎡</span>
    <p class="subtitle">單筆消費滿額即可參加</p>

    <div class="wheel-container">
        <div class="pointer-box">
            <svg class="pointer-svg" viewBox="0 0 100 100">
                <path d="M50 0 C30 0 15 25 15 45 C15 70 50 100 50 100 C50 100 85 70 85 45 C85 25 70 0 50 0 Z" fill="#3b5998" stroke="#ffd700" stroke-width="4"/>
                <circle cx="50" cy="40" r="12" fill="#ffd700"/>
            </svg>
        </div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn">開始抽獎</button>
    <div id="result"></div>
    
    <div class="inventory-list" id="inventory">
        </div>
</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    const inventoryDiv = document.getElementById('inventory');

    // 1. 設定獎項與初始數量 (count)
    // 注意：若要在正式環境使用，這些數據通常應該存放在伺服器端資料庫中
    let prizes = [
        { name: 'A賞: GROHE 洗臉機', count: 12, color: '#EDB4B1' },
        { name: 'B賞: GROHE 馬克杯或水壺', count: 14, color: '#748BAC' },
        { name: 'C賞: GROHE 香皂', count: 21, color: '#64738E' },
        { name: 'D賞: LAUFEN 帆布袋', count: 32, color: '#96A9C0' },
        { name: 'E賞: GROHE 龍頭棉布', count: 40, color: '#AEBDC6' }
    ];

    let isSpinning = false;
    let currentRotation = 0;

    // 更新介面上的數量顯示
    function updateInventoryUI() {
        let html = "<strong>剩餘獎項：</strong><br>";
        prizes.forEach(p => {
            html += `${p.name}: ${p.count} <br>`;
        });
        inventoryDiv.innerHTML = html;
    }

    // 2. 繪製轉盤
    function drawWheel() {
        const numPrizes = prizes.length;
        const arc = (Math.PI * 2) / numPrizes;
        ctx.clearRect(0, 0, 600, 600);

        prizes.forEach((p, i) => {
            const angle = i * arc;
            
            ctx.beginPath();
            // 如果數量為 0，顏色變灰
            ctx.fillStyle = p.count > 0 ? p.color : '#eee';
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 300, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = p.count > 0 ? "#fff" : "#bbb";
            ctx.font = "bold 32px Microsoft JhengHei";
            ctx.fillText(p.name.split(':')[0], 250, 10);
            ctx.restore();
        });
    }

    // 3. 根據「剩餘數量」計算結果
    function getStockBasedResult() {
        const remainingPrizes = prizes.map((p, index) => ({ ...p, originalIndex: index }))
                                      .filter(p => p.count > 0);
        
        if (remainingPrizes.length === 0) return -1;

        const totalStock = remainingPrizes.reduce((sum, p) => sum + p.count, 0);
        let random = Math.random() * totalStock;

        for (let i = 0; i < remainingPrizes.length; i++) {
            if (random < remainingPrizes[i].count) {
                return remainingPrizes[i].originalIndex;
            }
            random -= remainingPrizes[i].count;
        }
        return remainingPrizes[remainingPrizes.length - 1].originalIndex;
    }

    // 4. 執行抽獎
    spinBtn.onclick = () => {
        if (isSpinning) return;

        const prizeIndex = getStockBasedResult();
        
        if (prizeIndex === -1) {
            alert("所有獎項已抽完，感謝參與！");
            return;
        }

        isSpinning = true;
        spinBtn.disabled = true;
        resultDiv.innerHTML = "旋轉中...";
        
        const segmentDeg = 360 / prizes.length;
        // 增加旋轉圈數，並計算目標角度
        const spins = 5; 
        const targetRotation = (spins * 360) + (360 - (prizeIndex * segmentDeg)) - (segmentDeg / 2);
        
        currentRotation += targetRotation; // 累加角度讓下次旋轉順暢

        canvas.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)";
        canvas.style.transform = `rotate(${currentRotation - 90}deg)`;

        setTimeout(() => {
            const winner = prizes[prizeIndex];
            
            // 關鍵：扣除數量
            winner.count--;
            
            resultDiv.innerHTML = `🎉 恭喜獲得：<span style="color:#ff6600">${winner.name}</span>`;
            alert(`恭喜您抽中：${winner.name}！\n庫存已更新。`);
            
            isSpinning = false;
            spinBtn.disabled = false;
            
            // 重新更新介面與轉盤
            updateInventoryUI();
            drawWheel(); 
        }, 5200);
    };

    // 初始化
    drawWheel();
    updateInventoryUI();
</script>

</body>
</html>
